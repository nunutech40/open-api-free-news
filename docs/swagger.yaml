basePath: /api/v1
definitions:
  free-api-news_internal_domain.AuthResponse:
    properties:
      access_expiry:
        type: string
      access_token:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/free-api-news_internal_domain.User'
    type: object
  free-api-news_internal_domain.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  free-api-news_internal_domain.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  free-api-news_internal_domain.RegisterRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  free-api-news_internal_domain.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  free-api-news_internal_util.Response:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
host: 103.181.143.73:8081
info:
  contact:
    email: support@example.com
    name: API Support
  description: Backend REST API for a Flutter News App with Auth
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Free API News Auth
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password to get tokens
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/free-api-news_internal_domain.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: login successful
          schema:
            allOf:
            - $ref: '#/definitions/free-api-news_internal_util.Response'
            - properties:
                data:
                  $ref: '#/definitions/free-api-news_internal_domain.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/free-api-news_internal_util.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/free-api-news_internal_util.Response'
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revoke refresh token
      parameters:
      - description: Logout Request (refresh token to revoke)
        in: body
        name: request
        required: true
        schema:
          properties:
            refresh_token:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: logged out successfully
          schema:
            $ref: '#/definitions/free-api-news_internal_util.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/free-api-news_internal_util.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/free-api-news_internal_util.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/free-api-news_internal_util.Response'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - auth
  /auth/me:
    get:
      description: Returns user info based on validated JWT
      produces:
      - application/json
      responses:
        "200":
          description: authenticated user
          schema:
            allOf:
            - $ref: '#/definitions/free-api-news_internal_util.Response'
            - properties:
                data:
                  properties:
                    email:
                      type: string
                    user_id:
                      format: int64
                      type: integer
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/free-api-news_internal_util.Response'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Get a new access and refresh token pair using an unexpired refresh
        token
      parameters:
      - description: Refresh Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/free-api-news_internal_domain.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: token refreshed
          schema:
            allOf:
            - $ref: '#/definitions/free-api-news_internal_util.Response'
            - properties:
                data:
                  $ref: '#/definitions/free-api-news_internal_domain.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/free-api-news_internal_util.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/free-api-news_internal_util.Response'
      summary: Refresh token pair
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register with name, email and password (min 8 chars)
      parameters:
      - description: Register Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/free-api-news_internal_domain.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: registration successful
          schema:
            allOf:
            - $ref: '#/definitions/free-api-news_internal_util.Response'
            - properties:
                data:
                  $ref: '#/definitions/free-api-news_internal_domain.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/free-api-news_internal_util.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/free-api-news_internal_util.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/free-api-news_internal_util.Response'
      summary: Register a new user
      tags:
      - auth
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
